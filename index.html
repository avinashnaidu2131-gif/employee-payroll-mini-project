<!DOCTYPE html>
<html>
<head>
    <title>Employee Payroll Management System</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>Employee Payroll Management System</h1>
</header>

<div class="container">

<h2>Enter Employee Details</h2>

<div class="form">

<label>Employee ID</label>
<input type="text" id="empId">

<label>Employee Name</label>
<input type="text" id="empName">

<label>Basic Salary</label>
<input type="number" id="basicSalary">

<label>Allowance</label>
<input type="number" id="allowance">

<label>Tax (%)</label>
<input type="number" id="tax">

<label>Other Deduction</label>
<input type="number" id="deduction">

<button onclick="generatePayroll()">Generate Salary Slip</button>

</div>

<h2>Salary Slip</h2>

<pre id="output"></pre>

</div>

<script src="script.js"></script>

</body>
</html>
