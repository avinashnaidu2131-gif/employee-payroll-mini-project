<!DOCTYPE html>
<html>
<head>
<title>Employee Payroll Management System</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>Employee Payroll Management System</h1>
</header>

<div class="container">

<h2>Employee Details</h2>

<label>Employee ID</label>
<input type="text" id="empId">

<label>Employee Name</label>
<input type="text" id="empName">

<label>Basic Salary</label>
<input type="number" id="basicSalary">

<label>Allowance</label>
<input type="number" id="allowance">

<label>Employee Type</label>
<select id="empType">
<option value="Manager">Manager</option>
<option value="Developer">Developer</option>
</select>

<label>Bonus (Manager)</label>
<input type="number" id="bonus">

<label>Overtime (Developer)</label>
<input type="number" id="overtime">

<label>Tax (%)</label>
<input type="number" id="tax">

<label>Other Deduction</label>
<input type="number" id="deduction">

<div class="buttons">

<button class="generate" onclick="generatePayroll()">Generate Slip</button>
<button class="print" onclick="printSlip()">Print</button>
<button class="excel" onclick="exportExcel()">Export Excel</button>
<button class="dashboard" onclick="showDashboard()">Dashboard</button>
<button class="clear" onclick="clearFields()">Clear</button>
<button class="exit" onclick="exitPage()">Exit</button>

</div>

<h2>Salary Slip</h2>

<pre id="output"></pre>

</div>

<script src="script.js"></script>

</body>
</html>
